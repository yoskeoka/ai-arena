name: online-release-staging-verify

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA whose staging deploy should be verified
        required: true
        type: string
      frontend_url:
        description: Staging frontend URL
        required: false
        default: https://staging.ai-arena.pages.dev
        type: string
      backend_url:
        description: Staging backend URL
        required: false
        default: https://ai-arena-staging-p4ml.onrender.com
        type: string
      preset_id:
        description: Preset ID to enqueue during verification
        required: false
        default: echo-reference
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-staging:
    runs-on: ubuntu-latest
    concurrency:
      group: online-release-staging-verify
      cancel-in-progress: false
    steps:
      - name: Checkout target commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: operator-ui/pnpm-lock.yaml

      - name: Install operator UI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: operator-ui

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
        working-directory: operator-ui

      - name: Verify remote staging operator flow
        run: pnpm run verify:remote
        working-directory: operator-ui
        env:
          CI: "true"
          OPERATOR_UI_BASE_URL: ${{ inputs.frontend_url }}
          OPERATOR_UI_BACKEND_BASE_URL: ${{ inputs.backend_url }}
          OPERATOR_UI_PRESET_ID: ${{ inputs.preset_id }}

      - name: Upload staging verification artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: online-release-staging-verify
          path: |
            operator-ui/test-results/remote
            operator-ui/playwright-report/remote
          if-no-files-found: ignore

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Staging verification"
            echo
            echo "- Commit SHA: \`${TARGET_SHA}\`"
            echo "- Frontend URL: ${FRONTEND_URL}"
            echo "- Backend URL: ${BACKEND_URL}"
            echo "- Artifact: GitHub Actions artifact \`online-release-staging-verify\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          TARGET_SHA: ${{ inputs.commit_sha }}
          FRONTEND_URL: ${{ inputs.frontend_url }}
          BACKEND_URL: ${{ inputs.backend_url }}
