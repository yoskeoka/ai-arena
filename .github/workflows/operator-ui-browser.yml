name: operator-ui-browser

on:
  pull_request:
    paths:
      - ".github/workflows/operator-ui-browser.yml"
      - "Makefile"
      - "cmd/arena-service/**"
      - "cmd/operator-ui-fixture/**"
      - "config/platform-service/**"
      - "internal/platform/**"
      - "operator-ui/**"
      - "tools/dev/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/operator-ui-browser.yml"
      - "Makefile"
      - "cmd/arena-service/**"
      - "cmd/operator-ui-fixture/**"
      - "config/platform-service/**"
      - "internal/platform/**"
      - "operator-ui/**"
      - "tools/dev/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  operator-ui-browser-file-backed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: operator-ui/pnpm-lock.yaml

      - name: Install operator UI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: operator-ui

      - name: Verify browser runtime
        run: |
          pnpm exec playwright --version
          command -v google-chrome
          google-chrome --version
        working-directory: operator-ui

      - name: Run file-backed browser lane
        run: pnpm run verify:ci:file-backed
        working-directory: operator-ui
        env:
          CI: "true"
          OPERATOR_UI_BROWSER_CHANNEL: chrome
          OPERATOR_UI_SKIP_BROWSER_BOOTSTRAP: "1"
          OPERATOR_UI_ARTIFACT_DIR: ./test-results/file-backed
          OPERATOR_UI_REPORT_DIR: ./playwright-report/file-backed

      - name: Upload file-backed browser artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: operator-ui-browser-file-backed
          path: |
            operator-ui/test-results/file-backed
            operator-ui/playwright-report/file-backed
          if-no-files-found: ignore

  operator-ui-browser-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: arena_service
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: arena
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arena -d arena_service"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: operator-ui/pnpm-lock.yaml

      - name: Install operator UI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: operator-ui

      - name: Start SeaweedFS harness
        run: make seaweed-up

      - name: Verify browser runtime
        run: |
          pnpm exec playwright --version
          command -v google-chrome
          google-chrome --version
        working-directory: operator-ui

      - name: Run Postgres browser lane
        run: pnpm run verify:ci:postgres
        working-directory: operator-ui
        env:
          CI: "true"
          AI_ARENA_PG_TEST_DSN: postgres://arena:arena@127.0.0.1:5432/arena_service?sslmode=disable
          AI_ARENA_PG_ATLAS_DEV_DSN: postgres://arena:arena@127.0.0.1:5432/postgres?sslmode=disable
          OPERATOR_UI_BROWSER_CHANNEL: chrome
          OPERATOR_UI_SKIP_BROWSER_BOOTSTRAP: "1"
          OPERATOR_UI_ARTIFACT_DIR: ./test-results/postgres
          OPERATOR_UI_REPORT_DIR: ./playwright-report/postgres
          SEAWEED_MANAGED: external

      - name: Upload Postgres browser artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: operator-ui-browser-postgres
          path: |
            operator-ui/test-results/postgres
            operator-ui/playwright-report/postgres
          if-no-files-found: ignore
