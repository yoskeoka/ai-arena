name: go-ci

on:
  pull_request:
    paths:
      - ".github/workflows/go-ci.yml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - "sqlc.yaml"
      - "revive.toml"
      - "**/*.go"
      - "internal/platform/service/postgres/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/go-ci.yml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - "sqlc.yaml"
      - "revive.toml"
      - "**/*.go"
      - "internal/platform/service/postgres/**"

jobs:
  go-test-file-backed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Cache Go module and build state
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}-test-file-backed
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}-
            ${{ runner.os }}-go-

      - name: Run file-backed unit tests
        run: make GOPATH=/home/runner/go GOMODCACHE=/home/runner/go/pkg/mod GOCACHE=/home/runner/.cache/go-build test

  go-test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: arena_service
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: arena
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arena -d arena_service"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      AI_ARENA_PG_TEST_DSN: postgres://arena:arena@127.0.0.1:5432/arena_service?sslmode=disable
      AI_ARENA_PG_ATLAS_DEV_DSN: postgres://arena:arena@127.0.0.1:5432/postgres?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Cache Go module and build state
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}-test-postgres
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}-
            ${{ runner.os }}-go-

      - name: Run Postgres-backed tests
        run: make GOPATH=/home/runner/go GOMODCACHE=/home/runner/go/pkg/mod GOCACHE=/home/runner/.cache/go-build AI_ARENA_PG_TEST_DSN=${{ env.AI_ARENA_PG_TEST_DSN }} test-postgres

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Cache Go module and build state
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}-lint
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}-
            ${{ runner.os }}-go-

      - name: Run lint
        run: make GOPATH=/home/runner/go GOMODCACHE=/home/runner/go/pkg/mod GOCACHE=/home/runner/.cache/go-build lint

      - name: Check sqlc generated code drift
        run: |
          make postgres-sqlc-generate
          git diff --exit-code -- internal/platform/service/postgres/sqlc
