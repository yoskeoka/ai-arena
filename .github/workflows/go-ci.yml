name: go-ci

on:
  pull_request:
    paths:
      - ".github/workflows/go-ci.yml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - "revive.toml"
      - "**/*.go"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/go-ci.yml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - "revive.toml"
      - "**/*.go"

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Cache Go module and build state
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}-test
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}-
            ${{ runner.os }}-go-

      - name: Run unit tests
        run: make GOPATH=/home/runner/go GOMODCACHE=/home/runner/go/pkg/mod GOCACHE=/home/runner/.cache/go-build test

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Cache Go module and build state
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}-lint
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}-
            ${{ runner.os }}-go-

      - name: Run lint
        run: make GOPATH=/home/runner/go GOMODCACHE=/home/runner/go/pkg/mod GOCACHE=/home/runner/.cache/go-build lint
