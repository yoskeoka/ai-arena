name: online-release-staging

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to deploy to staging
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOUDFLARE_PAGES_PROJECT: ai-arena
  CLOUDFLARE_PAGES_STAGING_BRANCH: staging
  STAGING_FRONTEND_URL: https://staging.ai-arena.pages.dev
  STAGING_BACKEND_URL: https://ai-arena-staging-p4ml.onrender.com

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    concurrency:
      group: online-release-staging
      cancel-in-progress: false
    steps:
      - name: Checkout target commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: operator-ui/pnpm-lock.yaml

      - name: Install operator UI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: operator-ui

      - name: Build operator UI
        run: pnpm run build
        working-directory: operator-ui

      - name: Deploy staging Pages preview
        run: npx wrangler pages deploy dist --project-name="${CLOUDFLARE_PAGES_PROJECT}" --branch="${CLOUDFLARE_PAGES_STAGING_BRANCH}"
        working-directory: operator-ui
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Trigger staging Render deploy
        run: curl --fail --silent --show-error "${RENDER_STAGING_DEPLOY_HOOK_URL}?ref=${TARGET_SHA}"
        env:
          RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
          TARGET_SHA: ${{ inputs.commit_sha }}

      - name: Write workflow summary
        run: |
          {
            echo "## Staging deploy"
            echo
            echo "- Commit SHA: \`${TARGET_SHA}\`"
            echo "- Frontend URL: ${STAGING_FRONTEND_URL}"
            echo "- Backend URL: ${STAGING_BACKEND_URL}"
            echo "- Next step: run \`online-release-staging-verify.yml\` with the same commit SHA"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          TARGET_SHA: ${{ inputs.commit_sha }}
