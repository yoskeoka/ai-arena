name: online-release-staging

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to deploy to staging
        required: true
        type: string
  workflow_run:
    workflows:
      - go-ci
      - operator-ui-browser
      - Japanese textlint
      - Slopless
      - Workflow Lint
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOUDFLARE_PAGES_PROJECT: ai-arena
  CLOUDFLARE_PAGES_STAGING_BRANCH: staging
  STAGING_FRONTEND_URL: https://staging.ai-arena.pages.dev
  STAGING_BACKEND_URL: https://ai-arena-staging-p4ml.onrender.com

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.prepare.outputs.should_deploy }}
      target_sha: ${{ steps.prepare.outputs.target_sha }}
    steps:
      - name: Evaluate release gate
        id: prepare
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            if (context.eventName === "workflow_dispatch") {
              core.setOutput("should_deploy", "true");
              core.setOutput("target_sha", "${{ inputs.commit_sha }}");
              return;
            }

            const upstream = context.payload.workflow_run;
            const targetSha = upstream.head_sha;

            core.setOutput("target_sha", targetSha);

            if (upstream.event !== "push" || upstream.head_branch !== "main" || upstream.conclusion !== "success") {
              core.info(`skip: upstream event=${upstream.event} branch=${upstream.head_branch} conclusion=${upstream.conclusion}`);
              core.setOutput("should_deploy", "false");
              return;
            }

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: "main",
              event: "push",
              per_page: 100,
            });

            const releaseWorkflowNames = new Set([
              "online-release-staging",
              "online-release-staging-verify",
              "online-release-production",
            ]);

            const sameShaRuns = data.workflow_runs.filter((run) => {
              return run.head_sha === targetSha && !releaseWorkflowNames.has(run.name);
            });

            if (sameShaRuns.length === 0) {
              core.info(`skip: no push workflow runs found for ${targetSha}`);
              core.setOutput("should_deploy", "false");
              return;
            }

            const blockingRun = sameShaRuns.find((run) => {
              return run.status !== "completed" || run.conclusion !== "success";
            });
            if (blockingRun) {
              core.info(`skip: workflow ${blockingRun.name} status=${blockingRun.status} conclusion=${blockingRun.conclusion}`);
              core.setOutput("should_deploy", "false");
              return;
            }

            const currentRuns = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: ".github/workflows/online-release-staging.yml",
              per_page: 100,
            });

            const duplicate = currentRuns.data.workflow_runs.find((run) => {
              return run.id !== context.runId && run.head_sha === targetSha && (run.status !== "completed" || run.conclusion === "success");
            });
            if (duplicate) {
              core.info(`skip: staging workflow already exists for ${targetSha} as run ${duplicate.id} status=${duplicate.status} conclusion=${duplicate.conclusion}`);
              core.setOutput("should_deploy", "false");
              return;
            }

            core.setOutput("should_deploy", "true");

  deploy-staging:
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: online-release-staging-${{ needs.prepare.outputs.target_sha }}
      cancel-in-progress: false
    steps:
      - name: Checkout target commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: operator-ui/pnpm-lock.yaml

      - name: Install operator UI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: operator-ui

      - name: Build operator UI
        run: pnpm run build
        working-directory: operator-ui

      - name: Deploy staging Pages preview
        run: npx wrangler pages deploy dist --project-name="${CLOUDFLARE_PAGES_PROJECT}" --branch="${CLOUDFLARE_PAGES_STAGING_BRANCH}"
        working-directory: operator-ui
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Trigger staging Render deploy
        run: |
          case "${RENDER_STAGING_DEPLOY_HOOK_URL}" in
            *\?*) deploy_url="${RENDER_STAGING_DEPLOY_HOOK_URL}&ref=${TARGET_SHA}" ;;
            *) deploy_url="${RENDER_STAGING_DEPLOY_HOOK_URL}?ref=${TARGET_SHA}" ;;
          esac
          curl --fail --silent --show-error --request POST "${deploy_url}"
        env:
          RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}

      - name: Write workflow summary
        run: |
          {
            echo "## Staging deploy"
            echo
            echo "- Commit SHA: \`${TARGET_SHA}\`"
            echo "- Frontend URL: ${STAGING_FRONTEND_URL}"
            echo "- Backend URL: ${STAGING_BACKEND_URL}"
            echo "- Next step: \`online-release-staging-verify.yml\` will run automatically for the same commit SHA"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
