name: online-release-staging

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Full commit SHA or unique short commit SHA to deploy to staging
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOUDFLARE_PAGES_PROJECT: ai-arena
  CLOUDFLARE_PAGES_STAGING_BRANCH: staging
  STAGING_FRONTEND_URL: https://staging.ai-arena.pages.dev
  STAGING_BACKEND_URL: https://ai-arena-staging-p4ml.onrender.com

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.prepare.outputs.should_deploy }}
      target_sha: ${{ steps.prepare.outputs.target_sha }}
    steps:
      - name: Evaluate release gate
        id: prepare
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const resolveDispatchedSha = async (rawRef) => {
              const candidate = rawRef.trim();
              if (!/^[0-9a-f]{7,40}$/i.test(candidate)) {
                core.setFailed("commit_sha must be a full SHA or a unique short SHA using 7-40 hexadecimal characters.");
                return null;
              }

              try {
                const { data } = await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: candidate,
                });
                return data.sha;
              } catch (error) {
                core.setFailed(`commit_sha '${candidate}' could not be resolved. Use a full SHA or a unique short SHA on this repository.`);
                return null;
              }
            };
            const nonReleasePatterns = [
              "docs/**",
              "README.md",
              ".github/PULL_REQUEST_TEMPLATE.md",
            ];
            const requiredWorkflows = [
              {
                name: "go-ci",
                patterns: [
                  ".github/workflows/go-ci.yml",
                  "Makefile",
                  "go.mod",
                  "go.sum",
                  "sqlc.yaml",
                  "revive.toml",
                  "**/*.go",
                  "internal/platform/service/postgres/**",
                ],
              },
              {
                name: "operator-ui-browser",
                patterns: [
                  ".github/workflows/operator-ui-browser.yml",
                  "Makefile",
                  "cmd/arena-service/**",
                  "cmd/operator-ui-fixture/**",
                  "config/platform-service/**",
                  "internal/platform/**",
                  "operator-ui/**",
                  "tools/dev/**",
                ],
              },
            ];
            const globToRegExp = (pattern) => {
              let source = "^";
              for (let i = 0; i < pattern.length; i += 1) {
                const char = pattern[i];
                if (char === "*") {
                  const next = pattern[i + 1];
                  if (next === "*") {
                    source += ".*";
                    i += 1;
                  } else {
                    source += "[^/]*";
                  }
                  continue;
                }
                if (char === "?") {
                  source += ".";
                  continue;
                }
                if ("\\.[]{}()+-^$|".includes(char)) {
                  source += `\\${char}`;
                  continue;
                }
                source += char;
              }
              source += "$";
              return new RegExp(source);
            };
            const matchesAny = (patterns, value) => patterns.some((pattern) => globToRegExp(pattern).test(value));

            if (context.eventName === "workflow_dispatch") {
              const inputs = context.payload.inputs ?? {};
              const targetSha = await resolveDispatchedSha(inputs.commit_sha ?? "");
              if (!targetSha) {
                return;
              }
              core.setOutput("should_deploy", "true");
              core.setOutput("target_sha", targetSha);
              core.info(`resolved workflow_dispatch commit_sha to ${targetSha}`);
              return;
            }

            const targetSha = context.sha;
            const maxAttempts = 40;
            const pollIntervalMs = 15000;

            core.setOutput("target_sha", targetSha);

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            let expectedWorkflowNames = [];

            try {
              const beforeSha = context.payload.before;
              const isInitialPush = !beforeSha || /^0+$/.test(beforeSha);
              if (isInitialPush) {
                core.info(`initial push detected for ${targetSha}; defaulting to deploy`);
              } else {
                const comparison = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `${beforeSha}...${targetSha}`,
                });
                const changedFiles = (comparison.data.files || []).map((file) => file.filename);
                core.info(`changed files for ${targetSha}: ${changedFiles.join(",") || "none"}`);

                if (changedFiles.length === 0) {
                  core.info(`no changed files reported for ${targetSha}; defaulting to deploy`);
                } else {
                  const deployRelevantFiles = changedFiles.filter((file) => !matchesAny(nonReleasePatterns, file));
                  if (deployRelevantFiles.length === 0) {
                    core.info(`skip: only non-release files changed for ${targetSha}`);
                    core.setOutput("should_deploy", "false");
                    return;
                  }

                  expectedWorkflowNames = requiredWorkflows
                    .filter((workflow) => changedFiles.some((file) => matchesAny(workflow.patterns, file)))
                    .map((workflow) => workflow.name);
                }
              }
            } catch (error) {
              core.warning(`failed to evaluate changed files for ${targetSha}; defaulting to deploy: ${error.message}`);
            }

            if (expectedWorkflowNames.length === 0) {
              core.info(`no required push workflows apply to ${targetSha}; proceeding directly to deploy`);
              core.setOutput("should_deploy", "true");
              return;
            }

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: "main",
                event: "push",
                per_page: 100,
              });

              const runsByName = new Map();
              for (const run of data.workflow_runs) {
                if (run.head_sha !== targetSha) {
                  continue;
                }
                if (!expectedWorkflowNames.includes(run.name)) {
                  continue;
                }
                const current = runsByName.get(run.name);
                if (!current || run.id > current.id) {
                  runsByName.set(run.name, run);
                }
              }

              const missing = expectedWorkflowNames.filter((name) => !runsByName.has(name));
              const failed = Array.from(runsByName.values()).find((run) => {
                return run.status === "completed" && run.conclusion !== "success";
              });
              if (failed) {
                core.setFailed(`required workflow ${failed.name} concluded with ${failed.conclusion} for ${targetSha}`);
                return;
              }

              const pending = Array.from(runsByName.values()).filter((run) => run.status !== "completed");
              if (missing.length === 0 && pending.length === 0) {
                core.info(`all required workflows succeeded for ${targetSha}`);
                core.setOutput("should_deploy", "true");
                return;
              }

              core.info(
                `waiting for required workflows on ${targetSha}; attempt=${attempt}/${maxAttempts} missing=${missing.join(",") || "none"} pending=${pending.map((run) => run.name).join(",") || "none"}`
              );

              if (attempt < maxAttempts) {
                await sleep(pollIntervalMs);
              }
            }

            core.setFailed(`timed out waiting for required workflows for ${targetSha}`);

  deploy-staging:
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: online-release-staging-environment
      cancel-in-progress: false
    steps:
      - name: Checkout target commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}

      - name: Apply staging DB migrations
        run: make postgres-migrate-apply
        env:
          AI_ARENA_PG_MIGRATION_DSN: ${{ secrets.NEON_STAGING_MIGRATION_DSN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: operator-ui/pnpm-lock.yaml

      - name: Install operator UI dependencies
        run: pnpm install --frozen-lockfile
        working-directory: operator-ui

      - name: Build operator UI
        run: pnpm run build
        working-directory: operator-ui
        env:
          VITE_OPERATOR_API_BASE_URL: ${{ env.STAGING_BACKEND_URL }}

      - name: Deploy staging Pages preview
        run: npx wrangler pages deploy dist --project-name="${CLOUDFLARE_PAGES_PROJECT}" --branch="${CLOUDFLARE_PAGES_STAGING_BRANCH}"
        working-directory: operator-ui
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Trigger staging Render deploy
        run: |
          case "${RENDER_STAGING_DEPLOY_HOOK_URL}" in
            *\?*) deploy_url="${RENDER_STAGING_DEPLOY_HOOK_URL}&ref=${TARGET_SHA}" ;;
            *) deploy_url="${RENDER_STAGING_DEPLOY_HOOK_URL}?ref=${TARGET_SHA}" ;;
          esac
          curl --fail --silent --show-error --request POST "${deploy_url}"
        env:
          RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}

      - name: Write workflow summary
        run: |
          {
            echo "## Staging deploy"
            echo
            echo "- Commit SHA: \`${TARGET_SHA}\`"
            echo "- Frontend URL: ${STAGING_FRONTEND_URL}"
            echo "- Backend URL: ${STAGING_BACKEND_URL}"
            echo "- DB migration: applied before Pages/Render deploy via \`NEON_STAGING_MIGRATION_DSN\`"
            echo "- Next step: \`online-release-staging-verify.yml\` will run automatically for the same commit SHA"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
