services:
  postgres:
    image: postgres:17
    container_name: ai-arena-postgres
    environment:
      POSTGRES_DB: arena_service
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d arena_service"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ai-arena-postgres-data:/var/lib/postgresql/data

volumes:
  ai-arena-postgres-data:
